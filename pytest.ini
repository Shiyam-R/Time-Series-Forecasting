[pytest]
# Explicitly add the project root to sys.path before test collection.
# Without this, `import app...` inside test files fails when pytest is
# invoked as a bare `pytest` command (e.g. in CI) rather than `python -m
# pytest` — the latter implicitly adds the current working directory to
# sys.path, which is why this can look fine locally but break in CI.
pythonpath = .

# Consistent test discovery — don't rely on pytest's CLI-invocation-dependent
# defaults for where tests live or what counts as a test file.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Required by pytest-asyncio for any async test functions/fixtures.
asyncio_mode = auto

addopts = -v --strict-markers