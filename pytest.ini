[pytest]
# Consistent test discovery — don't rely on pytest's CLI-invocation-dependent
# defaults for where tests live or what counts as a test file.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Required by pytest-asyncio for any async test functions/fixtures.
asyncio_mode = auto

addopts = -v --strict-markers
