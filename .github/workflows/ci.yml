# ═══════════════════════════════════════════════════════════════════════════
# CI/CD Pipeline — Rossmann Forecasting API
#
# Runs on every push and pull request targeting main. Four jobs:
#   1. test              — install deps, run unit tests, validate syntax
#   2. security-audit     — scan production dependencies for known CVEs
#   3. docker-build        — builds the production image (validation only)
#   4. publish-ghcr         — pushes the image to GitHub Container Registry
#                             (CD step — main branch only, never on PRs)
#
# security-audit runs independently of docker-build: a vulnerability finding
# should be visible and should fail the overall workflow run, but it
# shouldn't block seeing whether the Docker image itself still builds —
# those are two different signals.
#
# publish-ghcr only runs on a direct push to main, and only after test,
# security-audit, AND docker-build have all succeeded — nothing gets
# published to the registry unless every other gate is green. It never runs
# on pull_request events: a PR from an untrusted branch should never be able
# to publish an image under this repository's name.
#
# The pipeline fails if ANY step in ANY job fails (GitHub Actions' default
# behavior — no continue-on-error is set anywhere here).
# ═══════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: install, verify dependencies, run tests, validate syntax
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test & Validate
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      # Pinned to 3.13 to match the local dev environment, the Dockerfile,
      # and the dependency pins verified for Python 3.13 wheel availability.
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          # Caches pip downloads between runs, keyed off requirements-dev.txt.
          # requirements-dev.txt itself references requirements.txt (-r
          # requirements.txt), so this cache covers both files.
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      # 4. Verify requirements install correctly
      # Installed BEFORE the dev requirements, deliberately, so this step
      # proves requirements.txt (the file the Docker image actually uses)
      # installs cleanly on its own — catching any accidental leakage of a
      # dev-only package into the production manifest.
      - name: Verify production requirements install cleanly
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 3. Install dependencies
      # Now layer in test tooling (pytest, httpx, pytest-asyncio) on top of
      # the already-verified production dependencies.
      - name: Install development dependencies
        run: pip install -r requirements-dev.txt

      # 6. Validate Python syntax
      # Byte-compiles every .py file under app/ and tests/; fails the build
      # on the first SyntaxError. Run before the test suite so a broken file
      # fails fast with a clear syntax error rather than a confusing
      # collection error from pytest.
      - name: Validate Python syntax
        run: python -m compileall app tests -q

      # 5. Run unit tests (if available)
      - name: Run unit tests
        run: pytest tests/ -v

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: scan production dependencies for known CVEs (PyPA Advisory
  # Database via pip-audit). Independent of docker-build — a vulnerability
  # finding is a separate signal from "does the image build."
  # ─────────────────────────────────────────────────────────────────────────
  security-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      # Scans requirements.txt specifically — production dependencies only,
      # i.e. what actually ships in the Docker image. Dev-only tooling
      # (pytest, httpx, etc. in requirements-dev.txt) isn't deployed, so a
      # vulnerability there doesn't carry the same risk and would just add
      # noise to this gate.
      - name: Audit production dependencies
        run: pip-audit -r requirements.txt

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: build the production Docker image (validation only — proves the
  # Dockerfile builds cleanly on every push/PR). Nothing is pushed here;
  # publishing happens in the separate publish-ghcr job below, gated to
  # main-branch pushes only.
  # ─────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test # only runs if the test job succeeds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. Build Docker image
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: rossmann-forecasting-api:ci
          # Cache Docker layers between CI runs using GitHub Actions' cache
          # backend — meaningfully speeds up rebuilds when only app/ changes
          # and the dependency-install layer can be reused.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4 (CD): publish the image to GitHub Container Registry.
  #
  # Runs ONLY on a direct push to main — never on pull_request events — and
  # only after test, security-audit, and docker-build have all succeeded.
  # Authenticates with the automatically-provided GITHUB_TOKEN; no extra
  # secret needs to be created for this.
  #
  # Pulls afterward with:
  #   docker pull ghcr.io/<owner>/<repo>:latest
  #   docker pull ghcr.io/<owner>/<repo>:<git-sha>   (for an exact, pinned build)
  # ─────────────────────────────────────────────────────────────────────────
  publish-ghcr:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [test, security-audit, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Required for docker/login-action to push to this repository's package
    # registry using GITHUB_TOKEN.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires lowercase image names/tags. github.repository is
      # "Owner/Repo" and may contain uppercase letters (this repo's name
      # does: Time-Series-Forecasting) — docker/metadata-action derives a
      # correctly-lowercased image reference automatically rather than
      # relying on a hardcoded string that could drift out of sync with
      # the actual repo name.
      - name: Extract image metadata (tags, lowercase name)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max